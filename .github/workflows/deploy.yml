name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  # ── Deploy everything to CT312 via self-hosted runner ──────────────────
  deploy:
    name: Deploy to staging
    runs-on: self-hosted
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest code
        run: |
          cd /opt/ice-skating
          git fetch origin main
          git reset --hard origin/main

      - name: Build images
        run: |
          cd /opt/ice-skating
          docker compose -f docker-compose.prod.yml build backend celery celery-beat frontend

      - name: Start full stack
        run: |
          cd /opt/ice-skating
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Verify services healthy
        run: |
          sleep 10
          cd /opt/ice-skating
          docker compose -f docker-compose.prod.yml ps
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:3001/ \
            | grep -qE "^(200|307)$" && echo "Frontend OK"

      - name: Clean up old images
        run: docker image prune -f --filter "until=24h"
