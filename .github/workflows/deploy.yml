name: Deploy

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  # ── Deploy everything to CT312 via self-hosted runner ──────────────────
  deploy:
    name: Deploy to staging
    runs-on: self-hosted
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest code
        run: |
          cd /opt/ice-skating
          git fetch origin main
          git reset --hard origin/main

      - name: Rebuild and restart backend
        run: |
          cd /opt/ice-skating
          docker compose -f docker-compose.prod.yml build backend celery celery-beat
          docker compose -f docker-compose.prod.yml up -d --no-deps --remove-orphans backend
          docker compose -f docker-compose.prod.yml up -d --no-deps celery celery-beat

      - name: Rebuild and restart frontend
        run: |
          cd /opt/ice-skating
          docker compose -f docker-compose.prod.yml build frontend
          docker compose -f docker-compose.prod.yml up -d --no-deps --remove-orphans frontend

      - name: Verify backend healthy
        run: |
          sleep 5
          curl -sf http://localhost:8001/api/v1/auth/token/ -X POST \
            -H "Content-Type: application/json" -d '{}' \
            -o /dev/null -w "%{http_code}" | grep -q "^400$" && echo "Backend OK"

      - name: Verify frontend healthy
        run: |
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:3001/ \
            | grep -qE "^(200|307)$" && echo "Frontend OK"

      - name: Clean up old images
        run: docker image prune -f --filter "until=24h"
