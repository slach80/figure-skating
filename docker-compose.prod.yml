services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: linecreek_staging
      POSTGRES_USER: linecreek_staging
      POSTGRES_PASSWORD: stagingpass123
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linecreek_staging"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file: .env.staging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A config worker -l info -Q default,payments,sync --concurrency 2
    env_file: .env.staging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env.staging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3001:3000"
    env_file: .env.staging
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  postgres_staging_data:
